name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt6 pywin32 pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "ZopiGuard" main.py

      - name: Zip build
        run: |
          Compress-Archive -Path dist/ZopiGuard -DestinationPath "ZopiGuard-${{ github.ref_name }}-windows.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ZopiGuard-*.zip
          generate_release_notes: true
